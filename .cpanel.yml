---
# cPanel Git — auto-deploy on pull (bizdavar.com)
# DEPLOYPATH توسط cPanel هنگام Deploy تنظیم می‌شود (معمولاً public_html)
deployment:
  tasks:
    - export DEPLOYPATH=${DEPLOYPATH:-$HOME/public_html}
    - /bin/mkdir -p $DEPLOYPATH/assets $DEPLOYPATH/pages $DEPLOYPATH/api $DEPLOYPATH/admin $DEPLOYPATH/storage
    - /bin/cp -f index.html robots.txt sitemap.xml .htaccess $DEPLOYPATH/
    - /bin/cp -a assets $DEPLOYPATH/
    - /bin/cp -a pages $DEPLOYPATH/
    - /bin/cp -a api $DEPLOYPATH/
    - /bin/cp -a admin $DEPLOYPATH/
    - /bin/mkdir -p $DEPLOYPATH/storage
